<h1>Named Entity Recognition (NER)</h1>
<p>NER identifies and classifies entities such as people, places, organizations, and dates.</p>
<p>Example: "Elon Musk founded SpaceX."</p>
<ul>
<li>Elon Musk → Person</li>
<li>SpaceX → Organization</li>
