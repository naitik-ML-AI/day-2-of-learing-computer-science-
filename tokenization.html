<h1>Tokenization</h1>
<p>Tokenization is the process of breaking down text into smaller units called tokens.
These tokens can be words, characters, or sentences.</p>
<p>Example: "I love NLP" → ["I", "love", "NLP"]</p>
<p>Tokenization is the first step in most Natural Language Processing pipelines.</p>
