<h1>Part of Speech (POS) Tagging</h1>
<p>POS tagging identifies the grammatical role of each word in a sentence.</p>
<p>Example: "She eats apples"</p>
<ul>
<li>She → Pronoun</li>
<li>eats → Verb</li>
<li>apples → Noun</li>
</ul>
